<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灰冰的心里话?</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body{
    background:#121212;
    color:#f0f0f0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  /* 加载界面 */
  #loading{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#121212;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .progress-bar{
    width:80%;
    max-width:350px;
    height:6px;
    background:#333;
    border-radius:3px;
    overflow:hidden;
  }
  .progress{
    height:100%;
    width:0%;
    background:#ffd700;
    animation:load 2s forwards;
  }
  @keyframes load{
    to{width:100%;}
  }
  .load-text{
    margin-top:15px;
    font-size:14px;
    color:#aaa;
  }

  /* 主界面 */
  #main{
    display:none;
    text-align:center;
    animation:fadeIn 1s forwards;
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }
  .title{
    font-size:32px;
    font-weight:bold;
    color:#ffd700;
    cursor:pointer;
    transition:0.2s;
  }
  .title:hover{
    transform:scale(1.05);
  }
  .tip{
    margin-top:8px;
    font-size:14px;
    color:#888;
  }

  /* 内容页面 */
  #content{
    display:none;
    max-width:600px;
    line-height:1.8;
    animation:fadeIn 1s forwards;
  }
  .text{
    font-size:16px;
    margin-bottom:20px;
    white-space:pre-line;
  }
  .footer{
    margin-top:30px;
    font-size:14px;
    color:#666;
  }
</style>
</head>

<body>

<!-- 加载 -->
<div id="loading">
  <div class="progress-bar">
    <div class="progress"></div>
  </div>
  <div class="load-text">正在加载灰冰的心里话...</div>
</div>

<!-- 主界面 -->
<div id="main">
  <div class="title" id="enter">灰冰说</div>
  <div class="tip">点击进入</div>
</div>

<!-- 内容 -->
<div id="content">
  <div class="text">
我的话可能会很少。
因为我现在有点小透明，
然后在忙很多事情。

此外我还没有上中学，
两个中学都没有把我录上，
所以心情很烦躁。
  </div>
  <div class="footer">—— 灰冰</div>
</div>

<script>
  // 加载完成
  setTimeout(()=>{
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
  },2000);

  // 点击进入内容
  document.getElementById("enter").onclick = function(){
    document.getElementById("main").style.display = "none";
    document.getElementById("content").style.display = "block";
  };
</script>

</body>
</html>
